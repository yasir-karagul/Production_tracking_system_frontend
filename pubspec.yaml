name: maia_porselen
description: Factory Production Tracking System - Cross-platform mobile app
publish_to: 'none'
version: 1.9.0+6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Database (Drift)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # Background Sync
  workmanager: ^0.9.0+3

  # Authentication
  flutter_secure_storage: ^9.2.2

  # UI Utilities
  google_fonts: ^6.2.1
  intl: ^0.20.2
  file_picker: ^8.1.2

  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.4.2
  path_provider: ^2.1.4
  path: ^1.9.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.22.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
flutter_icons:
  android: true
  ios: true
  image_path: "assets/maia.png"